name: Refresh BID Atlas data

on:
  schedule:
    - cron: "17 13 * * *"

permissions:
  contents: write

concurrency:
  group: bid-data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run admin:discover
      - run: npm run admin:update
        continue-on-error: true
      - run: npm run admin:audit:sync
      - name: Commit refreshed directory data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data data/last-change-report.json data/candidate-sources.json data/state-audit.csv
          git diff --cached --quiet || git commit -m "data: refresh BID directory"
          git push
