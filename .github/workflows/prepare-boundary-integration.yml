name: Prepare reviewed state BID boundaries

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      state:
        description: "Two-letter state code with an approved audit proposal, such as MA"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: boundary-integration-${{ github.event.pull_request.number || inputs.state }}
  cancel-in-progress: false

jobs:
  prepare:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Determine reviewed state
        id: state
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_STATE: ${{ inputs.state }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            state="${MANUAL_STATE^^}"
          else
            mapfile -t proposals < <(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" --paginate --jq '.[] | select(.filename | test("^data/audit-proposals/[A-Z]{2}\\.json$")) | .filename')
            if [[ "${#proposals[@]}" -ne 1 ]]; then
              echo "::notice::Merged PR did not contain exactly one state audit proposal; no boundary run is needed."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            state="$(basename "${proposals[0]}" .json)"
          fi
          if [[ ! "$state" =~ ^[A-Z]{2}$ ]]; then
            echo "Invalid state code: $state" >&2
            exit 1
          fi
          echo "state=$state" >> "$GITHUB_OUTPUT"
          echo "state_lower=${state,,}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
      - name: Check boundary-agent credentials
        if: steps.state.outputs.skip != 'true'
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          if [[ -z "$LLM_API_KEY" ]]; then
            echo "LLM_API_KEY is required for boundary integration." >&2
            exit 1
          fi
      - name: Apply approved audit proposal to the current ledger
        if: steps.state.outputs.skip != 'true'
        run: |
          npm run admin:audit:apply -- "--state=${{ steps.state.outputs.state }}"
          npm run admin:audit:sync
      - name: Research and prepare safe boundary imports
        if: steps.state.outputs.skip != 'true'
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_URL: ${{ vars.LLM_API_URL || 'https://api.x.ai/v1/responses' }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'grok-4.5' }}
          LLM_MAX_TOKENS: ${{ vars.LLM_MAX_TOKENS || '8000' }}
          LLM_TIMEOUT_MS: ${{ vars.LLM_TIMEOUT_MS || '300000' }}
          LLM_REASONING_EFFORT: ${{ vars.LLM_REASONING_EFFORT }}
        run: npm run admin:boundaries:prepare -- "--state=${{ steps.state.outputs.state }}"
      - name: Regenerate map data when boundaries passed the gates
        if: steps.state.outputs.skip != 'true'
        run: |
          source_id="$(node -e 'const r=require("./data/boundary-proposals/_latest-run.json"); process.stdout.write(r.source_id)')"
          if [[ -n "$source_id" ]]; then
            npm run admin:update -- "--sources=$source_id"
            npm run admin:audit:sync
          fi
      - name: Validate the proposed integration
        if: steps.state.outputs.skip != 'true'
        run: npm test
      - name: Open draft boundary review pull request
        if: steps.state.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          STATE: ${{ steps.state.outputs.state }}
          STATE_LOWER: ${{ steps.state.outputs.state_lower }}
        run: |
          set -euo pipefail
          branch="automation/boundary-integration-${STATE_LOWER}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          imported="$(node -e 'const r=require("./data/boundary-proposals/_latest-run.json"); process.stdout.write(String(r.imported_feature_count))')"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add data/sources.json data/state-audit.csv public/data data/last-change-report.json "data/boundary-proposals/${STATE}.json"
          [[ -f "data/${STATE_LOWER}-automated-bids.geojson" ]] && git add "data/${STATE_LOWER}-automated-bids.geojson"
          if git diff --cached --quiet; then
            echo "No boundary proposal changes for ${STATE}."
            exit 0
          fi
          git commit -m "boundaries: prepare ${STATE} BID integration"
          git push --set-upstream origin "$branch"
          body="$(printf '%s\n\n%s\n\n%s\n\n%s\n%s\n%s\n%s\n%s\n' \
            "Automated boundary-integration proposal for **${STATE}** after its state audit was merged." \
            "**Automatically imported polygon features:** ${imported}" \
            "This is deliberately a draft. Review data/boundary-proposals/${STATE}.json and verify every included boundary visually against its cited official source." \
            "Review checklist:" \
            "- [ ] Active legal status is independently supported." \
            "- [ ] Proposed, historical, and similarly named districts are excluded." \
            "- [ ] Every polygon matches the authoritative map or GIS layer." \
            "- [ ] Approximate or parcel-derived geometry is labeled honestly." \
            "- [ ] Map drill-down, counts, and source-monitoring behavior are correct.")"
          gh pr create --draft --base main --head "$branch" --title "[${STATE}] Prepare BID boundaries" --body "$body"
