name: Refresh BID Atlas

on:
  schedule:
    - cron: "17 13 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run admin:discover
      - run: npm run admin:update
        continue-on-error: true
      - name: Commit verified changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data data/last-change-report.json data/candidate-sources.json
          git diff --cached --quiet || git commit -m "data: refresh BID directory"
          git push
