name: Research state BID coverage

on:
  schedule:
    - cron: "41 14 * * 1"
  workflow_dispatch:
    inputs:
      states:
        description: "Optional comma-separated state codes such as AL,AK"
        required: false
        type: string
      limit:
        description: "Maximum states to research"
        required: false
        default: "3"
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: state-audit
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check research credentials
        id: credentials
        env:
          XAI_KEY: ${{ secrets.XAI_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [[ -n "$XAI_KEY" || -n "$XAI_API_KEY" || -n "$LLM_API_KEY" || -n "$OPENAI_API_KEY" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::State audit skipped. Add XAI_KEY as a repository Actions secret."
          fi
      - name: Research states with Grok web search
        if: steps.credentials.outputs.ready == 'true'
        env:
          XAI_KEY: ${{ secrets.XAI_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_URL: ${{ vars.LLM_API_URL || 'https://api.x.ai/v1/responses' }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'grok-4.5' }}
          LLM_MAX_TOKENS: ${{ vars.LLM_MAX_TOKENS || '4000' }}
          LLM_TIMEOUT_MS: ${{ vars.LLM_TIMEOUT_MS || '300000' }}
          LLM_REASONING_EFFORT: ${{ vars.LLM_REASONING_EFFORT }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_URL: ${{ vars.OPENAI_API_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          INPUT_STATES: ${{ inputs.states }}
          INPUT_LIMIT: ${{ inputs.limit }}
        run: |
          args=("--limit=${INPUT_LIMIT:-3}")
          if [[ -n "$INPUT_STATES" ]]; then args+=("--states=$INPUT_STATES"); fi
          npm run admin:audit:research -- "${args[@]}"
      - name: Apply findings to the review branch
        if: steps.credentials.outputs.ready == 'true'
        run: |
          states="$(node -e 'const s=require("./data/audit-proposals/_latest-run.json"); process.stdout.write(s.states.join(","))')"
          npm run admin:audit:apply -- "--state=$states"
          npm run admin:audit:sync
      - name: Open a review pull request
        if: steps.credentials.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="automation/state-audit-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add data/state-audit.csv data/audit-proposals
          git diff --cached --quiet && exit 0
          git commit -m "audit: propose state BID research"
          git push --set-upstream origin "$branch"
          gh pr create --base main --head "$branch" --title "State BID audit research" --body "Automated Grok web-search research proposals. Review every cited source and CSV change before merging. No map source is added automatically."
