name: Research state BID coverage

on:
  schedule:
    - cron: "41 14 * * 1"
  workflow_dispatch:
    inputs:
      states:
        description: "Optional comma-separated state codes such as AL,AK"
        required: false
        type: string
      limit:
        description: "Maximum states to research"
        required: false
        default: "3"
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: state-audit
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Check research credentials
        id: credentials
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          if [[ -n "$LLM_API_KEY" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::State audit skipped. Add LLM_API_KEY as a repository Actions secret."
          fi
      - name: Research states with Grok web search
        if: steps.credentials.outputs.ready == 'true'
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_URL: ${{ vars.LLM_API_URL || 'https://api.x.ai/v1/responses' }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'grok-4.5' }}
          LLM_MAX_TOKENS: ${{ vars.LLM_MAX_TOKENS || '4000' }}
          LLM_TIMEOUT_MS: ${{ vars.LLM_TIMEOUT_MS || '300000' }}
          LLM_REASONING_EFFORT: ${{ vars.LLM_REASONING_EFFORT }}
          INPUT_STATES: ${{ inputs.states }}
          INPUT_LIMIT: ${{ inputs.limit }}
        run: |
          args=("--limit=${INPUT_LIMIT:-3}")
          if [[ -n "$INPUT_STATES" ]]; then args+=("--states=$INPUT_STATES"); fi
          npm run admin:audit:research -- "${args[@]}"
      - name: Open one review pull request per state
        if: steps.credentials.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mapfile -t states < <(node -e 'const s=require("./data/audit-proposals/_latest-run.json"); console.log(s.states.join("\n"))')

          for state in "${states[@]}"; do
            state_lower="${state,,}"
            branch="automation/state-audit-${state_lower}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            worktree="${RUNNER_TEMP}/state-audit-${state_lower}"

            git worktree add -b "$branch" "$worktree" "$GITHUB_SHA"
            mkdir -p "$worktree/data/audit-proposals"
            cp "data/audit-proposals/${state}.json" "$worktree/data/audit-proposals/${state}.json"

            (
              cd "$worktree"
              npm run admin:audit:apply -- "--state=$state"
              npm run admin:audit:sync
              git add data/state-audit.csv "data/audit-proposals/${state}.json"

              if git diff --cached --quiet; then
                echo "No reviewed audit changes for ${state}; skipping pull request."
              else
                git commit -m "audit: propose ${state} BID research"
                git push --set-upstream origin "$branch"
                body="Automated Grok web-search research proposal for **${state}**."
                body+=$'\n\nReview checklist:'
                body+=$'\n- [ ] Enabling authority and legal terminology are correct.'
                body+=$'\n- [ ] Named districts are active rather than proposed, expired, or historical.'
                body+=$'\n- [ ] Candidate sources and claimed boundaries match the cited pages.'
                body+=$'\n- [ ] Coverage, confidence, notes, and next action are appropriately cautious.'
                body+=$'\n\nMerging this PR updates the research ledger only. No map source or boundary is added automatically.'
                gh pr create --base main --head "$branch" --title "[${state}] State BID audit research" --body "$body"
              fi
            )

            git worktree remove "$worktree"
          done
